# Routing for the opendata-brand project.
#
# Alert-worthy categories (immediate): direct_question, issue_or_complaint,
# comparison. These are the three buckets where a fast response from the
# operator has real leverage — answering a public question, acknowledging
# a concrete issue, joining a comparison while it's live. positive_mention
# and neutral_mention are deliberately NOT alert-worthy; they land in the
# daily digest. ecosystem_discussion is also digest-only — on-thesis but
# not time-sensitive.
#
# max_item_age_hours is 24 (shorter than opendata's 72): for brand
# monitoring, a three-day-old question has probably run its course.
# Stale alerts are noise.

version: 2

immediate:
  threshold_urgency: 7
  max_item_age_hours: 24
  alert_worthy_categories:
    - direct_question
    - issue_or_complaint
    - comparison
  webhook_secret: OPENDATA_BRAND_SLACK_WEBHOOK_IMMEDIATE

digest:
  schedule:
    hour: 9
    minute: 0
    timezone: "America/Los_Angeles"
  webhook_secret: OPENDATA_BRAND_SLACK_WEBHOOK_DIGEST
  window_hours: 24

cost_caps:
  # Initial ceiling. Tune after a week of real (non-backfill) operation
  # once steady-state volume is observable. Brand-monitoring volume is
  # expected to be lower than the opendata project's since product-name
  # queries are phrase-quoted and narrow — but keep headroom through
  # the first backfill. The X daily read ceiling lives in sources/x.yaml
  # as `daily_read_cap`, not here.
  daily_haiku_tokens: 500000

infra:
  # Infra-channel webhook for cost-cap halts and future session-5c
  # staleness alerts. Optional: if the env/SSM name below is unset at
  # runtime, infra alerts fall back to the immediate webhook with a
  # [INFRA] prefix so the operator still gets paged.
  webhook_secret: OPENDATA_BRAND_SLACK_WEBHOOK_INFRA
