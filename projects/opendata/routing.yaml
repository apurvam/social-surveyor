# Routing for the opendata project.
#
# Alert-worthy categories (immediate): cost complaints, self-host intent,
# and competitor pain — the three buckets where a fast response has
# leverage. active_practitioner is deliberately NOT alert-worthy — it's
# relationship-building over time, not time-sensitive.
#
# Threshold 7 matches the stop criteria used in eval — the classifier's
# u>=7 band is "good engagement opportunity" or above.

version: 2

immediate:
  threshold_urgency: 7
  max_item_age_hours: 72
  alert_worthy_categories:
    - cost_complaint
    - self_host_intent
    - competitor_pain
  webhook_secret: OPENDATA_SLACK_WEBHOOK_IMMEDIATE

digest:
  schedule:
    hour: 9
    minute: 0
    timezone: "America/Los_Angeles"
  webhook_secret: OPENDATA_SLACK_WEBHOOK_DIGEST
  window_hours: 24

cost_caps:
  # Enforced at the start of every classify invocation by cost_caps.py:
  # sum of today's input+output Haiku tokens (UTC) vs this ceiling.
  # Value derived from the first post-deploy 24h: ~1.1M tokens observed
  # (dominated by the initial backfill of ~440 items), doubled. Steady
  # state should run well under 100k/day; revisit downward once we've
  # observed a week of non-backfill operation.
  #
  # The X daily cap lives in sources/x.yaml as `daily_read_cap`, not
  # here — see CostCapsConfig docstring.
  daily_haiku_tokens: 2200000

infra:
  # Infra-channel webhook for cost-cap halts and future session-5c
  # staleness alerts. Optional: if the env/SSM name below is unset at
  # runtime, infra alerts fall back to the immediate webhook with a
  # [INFRA] prefix so the operator still gets paged.
  webhook_secret: OPENDATA_SLACK_WEBHOOK_INFRA
