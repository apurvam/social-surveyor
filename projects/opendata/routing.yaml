# Routing for the opendata project.
#
# Alert-worthy categories (immediate): cost complaints, self-host intent,
# and competitor pain — the three buckets where a fast response has
# leverage. active_practitioner is deliberately NOT alert-worthy — it's
# relationship-building over time, not time-sensitive.
#
# Threshold 7 matches the stop criteria used in eval — the classifier's
# u>=7 band is "good engagement opportunity" or above.

version: 1

immediate:
  threshold_urgency: 7
  alert_worthy_categories:
    - cost_complaint
    - self_host_intent
    - competitor_pain
  webhook_secret: OPENDATA_SLACK_WEBHOOK_IMMEDIATE

digest:
  schedule:
    hour: 9
    minute: 0
    timezone: "America/Los_Angeles"
  webhook_secret: OPENDATA_SLACK_WEBHOOK_DIGEST
  window_hours: 24

cost_caps:
  daily_haiku_tokens: 500000
  daily_x_reads: 2000
