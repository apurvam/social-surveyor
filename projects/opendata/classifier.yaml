# Classifier configuration for the opendata-timeseries monitoring project.
# See projects/example/classifier.yaml for field-by-field documentation.

version: 1
# v3.5 expands the urgency note into a calibration block with worked
# examples. v3's urgency-independence prose wasn't enough — Haiku kept
# under-rating urgency on alert-worthy items (high-urgency MAE 4.43,
# alert-worthy recall 0.23). No other rule changes from v3.
prompt_version: "v3.5"

categories_file: "categories.yaml"

icp_description: |
  The user sells opendata-timeseries, a Prometheus-compatible TSDB built
  natively on object storage (MIT-licensed). The target audience is
  engineering leaders and senior ICs at companies spending $100k+/year on
  observability vendors (Datadog, New Relic, Grafana Cloud) who are
  considering self-hosting to cut costs but balk at the operational
  complexity of existing solutions (Mimir, Thanos, Cortex).

additional_instructions: |
  Classification rules (apply in order):

  1. First, decide if the post is about the observability / monitoring /
     metrics-storage space at all.
     - If the post is about a different space (crypto, frontend, databases
       unrelated to observability, job postings for unrelated roles) and
       only matched on an incidental keyword, classify as off_topic.
     - A post that lists "Prometheus" or "Datadog" as a skill or tag
       without discussing observability itself is off_topic.
     - Metaphorical uses of tool names (e.g., "the new Datadog bill but
       for AI") are off_topic — the post isn't about observability even
       if the name appears.
     - BUT: a short post that IS about observability still counts as
       in-scope. "Anyone else sick of Datadog pricing?" is in-scope with
       no caveats even though it's brief.

  2. If the post IS about the observability space but shows no specific
     pain, no active evaluation, no buying signal, and no practitioner
     depth, classify as neutral_discussion. General opinion, news, or
     casual conversation belongs here.

  3. Classify posts authored by observability practitioners (people with
     first-hand, operational experience with monitoring/metrics tooling)
     into one of these categories based on the author's stance:

     a. active_practitioner: author demonstrates deep, first-hand
        knowledge of observability tooling and shares that knowledge.
        They run, have run, or make active decisions about their
        monitoring stack. They share opinions on specific tools
        (Datadog, Prometheus, Mimir, Thanos, VictoriaMetrics, Grafana,
        New Relic, Honeycomb, etc.) informed by operational experience.
        They give advice based on their own practice. They may be happy
        with their current stack, or migrating, or reflecting on past
        choices. The key signal is OPERATIONAL DEPTH, not pain or active
        shopping.
        Examples of active_practitioner:
        - "We use VictoriaMetrics and it's been great since 2019"
        - "If you get serious about Prometheus you'll want Thanos for
           retention, here's what I learned"
        - "We evaluated Mimir vs Cortex last year and went with Mimir"
        - "I run Prometheus + Grafana at my homelab for a buck a month"
        - "We tried Datadog, moved to self-hosted, now back on Datadog
           because..."

     b. cost_complaint: author expresses a specific, personal complaint
        about their observability vendor's cost. Requires a first-person
        pain signal. "Our Datadog bill went from $30k to $80k after
        custom metrics pricing" qualifies. "Datadog is known to be
        expensive" is active_practitioner or neutral_discussion.

     c. self_host_intent: author is actively shopping for, asking how to
        set up, or currently evaluating a self-hosted Prometheus-
        compatible storage solution. The distinguishing signal vs
        active_practitioner is that they don't have a solution yet —
        they're asking questions, comparing options, or planning a move.
        Past evaluations resulting in a current choice are
        active_practitioner, not self_host_intent. "We evaluated Mimir
        vs VictoriaMetrics and went with Mimir" is active_practitioner.
        "We're evaluating Mimir vs VictoriaMetrics for our new cluster"
        is self_host_intent.

     d. competitor_pain: author is experiencing operational pain with
        Mimir, Thanos, Cortex, or VictoriaMetrics specifically. Requires
        a first-person pain signal. "We gave up on Thanos, too
        complex" qualifies. "Thanos is generally considered complex" is
        active_practitioner or neutral_discussion.

     When multiple of 3a-3d could apply, the order of precedence is:
     cost_complaint (explicit money pain) > self_host_intent (active
     shopping) > competitor_pain (operational pain) > active_practitioner
     (has a view but no acute signal).

  4. Use tutorial_or_marketing for content produced to teach or promote
     rather than to discuss the author's own practice. Vendor blog
     posts, how-to guides, launch announcements, conference talk
     recaps, and tutorials belong here — even when they mention
     observability tools in depth. The distinguishing signal vs
     active_practitioner: tutorials/marketing are explaining a topic TO
     an audience; active_practitioner items are the author TALKING ABOUT
     THEMSELVES.

  5. When torn between categories, look for concrete first-person
     language in the post:
     - First-person stake ("we ran into / I'm trying to / our team is /
       we're moving off")
       → 3a-3d per precedence
     - Advice grounded in own practice ("we tried X, use Y instead /
       if you get serious about X, you'll want Y")
       → active_practitioner
     - Generic how-to advice ("you should / here's how / consider X")
       → tutorial_or_marketing
     - Landscape commentary without first-person ("the industry is
       moving toward / many people use / X is generally")
       → neutral_discussion
     When torn between neutral_discussion and off_topic, re-check rule 1.

  Urgency note: urgency reflects the post's explicit signals — direct
  questions, stated evaluations, strong pain language, cost numbers,
  active planning — NOT your confidence in the category.

  Calibration examples:

  - "Our Datadog bill went from $30k to $80k last quarter, looking at
    alternatives" → urgency 9 (concrete pain + active intent)
  - "We're evaluating Mimir vs VictoriaMetrics for our new cluster,
    which should we pick?" → urgency 8 (active evaluation + question)
  - "How does everyone handle Prometheus long-term storage? Planning
    a migration soon" → urgency 8 (active planning + question)
  - "We gave up on Thanos, too complex, back on vendor now" → urgency 7
    (explicit pain with commitment signal)
  - "We run Mimir and it's been fine for 2 years" → urgency 3 (stable,
    no active signal)
  - "Honestly Datadog pricing is a known problem in the industry"
    → urgency 4 (landscape commentary, no personal stake)
  - "Use Prometheus + Grafana for metrics, works great" → urgency 2
    (generic recommendation, no urgency signal)

  Score urgency from signals in the post, independently of category.
  Do not let category uncertainty suppress urgency. Do not let category
  confidence inflate urgency.

few_shot_examples: []

model: "claude-haiku-4-5-20251001"
max_tokens: 500
temperature: 0.0

max_retries: 1
backoff_seconds: 2.0
