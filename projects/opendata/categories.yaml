# Category taxonomy + urgency scale for a project.
#
# Read by the Session 2.75 labeler and extended (not redefined) by
# Session 3's classifier.yaml. Keep the `id` values stable once you
# start labeling — renaming a category invalidates prior labels.
#
# For a fork: replace these categories with ones that match your ICP.

version: 2

categories:
  - id: cost_complaint
    label: "Observability cost complaint"
    description: >
      Author expresses a specific, first-person complaint about the cost
      of their observability vendor (Datadog, New Relic, Grafana Cloud).
      Requires a first-person pain signal, not general industry
      commentary about vendor pricing.
  - id: self_host_intent
    label: "Self-host Prometheus intent"
    description: >
      Author is shopping for, asking how to set up, or actively
      evaluating a self-hosted Prometheus-compatible storage solution.
      The distinguishing signal is that they don't have a solution yet
      — already-running practitioners reflecting on past choices are
      active_practitioner, not self_host_intent.
  - id: competitor_pain
    label: "Competitor operational pain"
    description: >
      Author is experiencing first-person operational pain with Mimir,
      Thanos, Cortex, or VictoriaMetrics. Landscape commentary about
      these tools' complexity, passing mentions, and feature discussion
      do not qualify.
  - id: active_practitioner
    label: "Active observability practitioner"
    description: >
      Author demonstrates deep, first-hand knowledge of observability
      tooling and the observability ecosystem — running, having run, or
      making active decisions about their monitoring/metrics/logging
      stack. Shares opinions on specific tools (Datadog, Prometheus,
      Mimir, Thanos, VictoriaMetrics, Grafana, etc.) informed by
      operational experience. May or may not be currently self-hosting.
      Not shopping for a new solution (that would be self_host_intent)
      and not expressing acute pain (that would be cost_complaint or
      competitor_pain). Good for relationship-building, product
      feedback, and community-building; not a direct sales opportunity.
  - id: neutral_discussion
    label: "Neutral topic discussion"
    description: >
      IS about the observability / Prometheus / metrics-storage space,
      but shows no practitioner depth (that would be active_practitioner),
      no specific pain (that would be cost_complaint or competitor_pain),
      and no active shopping (that would be self_host_intent). General
      opinion, landscape commentary, news, or casual conversation.
  - id: tutorial_or_marketing
    label: "Tutorial or vendor marketing"
    description: >
      Produced to teach or promote rather than to discuss real pain.
      Vendor blog posts, how-to guides, launch announcements, and
      conference talks belong here even when they mention the above
      categories.
  - id: off_topic
    label: "Off topic"
    description: >
      Not about the observability / Prometheus / metrics-storage space,
      even if a search term matched. Crypto posts, unrelated job
      listings, or tools that share a name with our keywords belong here.

urgency_scale:
  - range: [0, 3]
    meaning: "Irrelevant or passive mention, don't alert"
  - range: [4, 6]
    meaning: "Relevant discussion but not a high-leverage engagement opportunity"
  - range: [7, 8]
    meaning: "Good engagement opportunity — person is actively discussing the problem"
  - range: [9, 10]
    meaning: "Urgent — person is explicitly asking for a solution or evaluating vendors right now"
