# HN config for opendata-timeseries monitoring.
# Queries target the same three themes as Reddit: observability cost
# pain, Prometheus long-term storage, competitor mentions.
#
# Quoting note: YAML's outer quotes are just YAML string syntax — the
# value sent to Algolia is whatever's inside. Algolia treats multi-word
# queries as AND-of-tokens (`datadog cost` = "contains 'datadog' AND
# 'cost' somewhere"), which sweeps in noise from generic words like
# "cost", "bill", "storage". For an exact phrase, include literal
# double-quotes in the value: '"observability bill"' → sends
# "observability bill" with quote marks, which Algolia treats as a
# phrase match. Use that for generic-word phrases where AND-of-tokens
# would be too loose.

queries:
  # Observability pain. `datadog` and `new relic` were re-introduced
  # after the typoTolerance=false fix — earlier DROPs were largely
  # caused by Algolia's default typo tolerance matching `catalog` and
  # similar words, not by the queries themselves being too broad.
  # Re-triage will show whether the product-name approach now works
  # pre-classifier, or still needs tighter phrasing.
  - "datadog"
  - '"new relic"'
  - '"observability bill"'
  - '"grafana cloud"'

  # Prometheus storage (Session 2.75 triage DROPped "prometheus storage"
  # and "self host prometheus" as noise; kept the narrower ones).
  - "prometheus retention"

  # Competitor mentions. "thanos prometheus" DROPped in follow-up
  # triage — low volume and the disambiguation was still over-matching.
  - "mimir prometheus"
  - "cortex prometheus"
  # Two spellings of the same product. Algolia tokenizes on whitespace
  # so these queries don't overlap — a doc with "Victoria Metrics" won't
  # match the single-token query and vice versa. Measured live: 614 hits
  # for the compact form, 84 for the spaced form, only 12 in the
  # intersection. The separate entries pick up both variants with
  # storage-level dedup handling the small overlap.
  - "victoriametrics"
  - '"victoria metrics"'

tags: ["story", "comment"]
max_results_per_query: 50
