# X config for opendata-timeseries monitoring.
# COSTS REAL MONEY — $0.005/post read on pay-per-use.
# daily_read_cap starts low (500) so we can validate signal quality
# before loosening. Raise after we've seen what the queries return.

queries:
  - name: "observability_cost_complaints"
    query: '("datadog bill" OR "new relic cost" OR "grafana cloud expensive") -is:retweet lang:en'

  - name: "prometheus_storage_intent"
    query: '(prometheus ("self-host" OR "long-term storage" OR "durable")) -is:retweet lang:en'

  - name: "competitor_pain"
    # Three-clause AND: {TSDB context word} AND {product} AND {pain adjective}.
    # The earlier `thanos OR ...` form matched Marvel villain tweets in
    # droves; requiring a prometheus-adjacent context word disambiguates.
    # Cortex has the same collision (brain/medical/ARM Cortex-M) which the
    # context clause also handles.
    query: '(prometheus OR kubernetes OR metrics OR observability OR tsdb) (mimir OR thanos OR cortex OR victoriametrics) (complex OR pain OR nightmare OR expensive OR "gave up") -is:retweet lang:en'

max_results_per_query: 100
poll_interval_minutes: 10
daily_read_cap: 500
