# X config for opendata-timeseries monitoring.
# COSTS REAL MONEY — $0.005/post read on pay-per-use.
# daily_read_cap starts low (500) so we can validate signal quality
# before loosening. Raise after we've seen what the queries return.

queries:
  - name: "observability_cost_complaints"
    query: '("datadog bill" OR "datadog pricing" OR "datadog invoice" OR "datadog overage" OR "new relic cost" OR "grafana cloud expensive") -is:retweet lang:en'

  - name: "prometheus_storage_intent"
    query: '(prometheus ("self-host" OR "long-term storage" OR "durable")) -is:retweet lang:en'

  - name: "competitor_pain"
    # Two-clause AND: {TSDB context word} AND {product}. Co-mention of
    # a Prometheus-adjacent context term with a competing TSDB name is
    # already a strong signal — requiring an explicit pain adjective
    # on top was over-filtering (the earlier version returned 0 items
    # per poll). The classifier reads full bodies and can judge
    # pain vs praise itself.
    # The context clause still handles the "thanos = Marvel villain"
    # and "cortex = brain/ARM" ambiguities by forcing co-occurrence
    # with a TSDB-adjacent term.
    query: '(prometheus OR kubernetes OR metrics OR observability OR tsdb) (mimir OR thanos OR cortex OR victoriametrics) -is:retweet lang:en'

max_results_per_query: 100
poll_interval_minutes: 10
daily_read_cap: 500
