# GitHub config for opendata-timeseries monitoring.
# Queries run in two scopes per poll: default (issue body/title) and
# in:comments (comments matching the query text, fetched individually).
#
# Session 2.75 triage: the earlier broad queries (prometheus long term
# retention, datadog replacement observability, thanos OR mimir OR
# cortex cost, prometheus storage expensive) were all DROPped as
# noise-heavy — they matched every tracking issue in public GitHub,
# not the pain signals we care about. What remained was too narrow,
# so we replaced them with two scoped queries.

queries:
  # Narrow direct comparison; rare but high-signal when it fires.
  - q: "VictoriaMetrics vs thanos"
    type: issues

  # Cross-competitor intel: comments mentioning VictoriaMetrics inside
  # the Prometheus ecosystem's own org issue trackers. When someone on
  # a Thanos/Mimir/Cortex thread mentions VM as an alternative, that's
  # a strong "we're evaluating a migration" signal. The in:comments
  # scope follow-up fetches and filters the actual comments.
  - q: "victoriametrics (org:prometheus OR org:grafana OR org:thanos-io OR org:cortexproject)"
    type: issues

orgs_watchlist:
  - prometheus
  - grafana
  - thanos-io
  - cortexproject
  - VictoriaMetrics

max_results_per_query: 30
# Belt-and-suspenders against runaway comment fetches. Worst case under
# the current config (2 queries × 30 results each with in:comments
# scope) is 60 issues, well under this cap.
max_comment_fetches_per_poll: 100
