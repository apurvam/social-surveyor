# GitHub config for opendata-timeseries monitoring.
# Queries run in two scopes per poll: default (issue body/title) and
# in:comments (comments matching the query text, fetched individually).
#
# GitHub search does NOT support OR across multiple org: qualifiers.
# `victoriametrics (org:A OR org:B)` returns zero results; single
# `victoriametrics org:A` works. So the "mentions of VM inside the
# competing project orgs" signal is expressed as one query per org.

queries:
  # VictoriaMetrics mentions inside each competing project's issue
  # tracker. Comments of the form "we switched to VM from Thanos" or
  # "evaluating VM as an alternative" are the intended signal; the
  # in:comments scope follow-up fetches the actual matching comments.
  - q: "victoriametrics org:prometheus"
    type: issues
  # grafana dropped in Session 2.75 follow-up triage: Grafana is
  # *designed* to work with VictoriaMetrics as a datasource, so mentions
  # inside grafana/* issues are configuration questions ("how do I wire
  # up VM as a Grafana datasource?"), not competitive-intel signals.
  - q: "victoriametrics org:thanos-io"
    type: issues
  - q: "victoriametrics org:cortexproject"
    type: issues

orgs_watchlist:
  - prometheus
  - grafana
  - thanos-io
  - cortexproject
  - VictoriaMetrics

max_results_per_query: 30
# Worst case under current config (4 queries × 30 results each with
# in:comments scope) is 120 issues; 100 caps comment fetches before
# that. Under GitHub's 5k/hr rate limit either way.
max_comment_fetches_per_poll: 100
