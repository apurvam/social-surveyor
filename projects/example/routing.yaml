# Routing configuration for a project.
#
# - immediate.alert_worthy_categories + threshold_urgency: the two
#   conditions a classification must meet to fire an immediate Slack
#   alert. Everything else goes to the daily digest.
# - Webhook URLs live in env vars (or SSM in prod). This file names
#   them; it never contains the URLs themselves.
# - cost_caps: hard daily ceilings. daily_haiku_tokens is enforced at
#   the start of every classify invocation; the check sums today's
#   input+output tokens from api_usage and halts classification (and
#   pages the infra channel once per UTC day) when the ceiling is
#   crossed. X already has its own daily_read_cap enforced per-call.
# - infra: optional webhook for ops-side alerts (cost-cap halts,
#   future session-5c staleness alerts). If the secret name resolves,
#   alerts land here; otherwise they fall back to the immediate
#   webhook with a [INFRA] prefix so the operator still gets paged.

version: 2

immediate:
  threshold_urgency: 7
  max_item_age_hours: 72
  alert_worthy_categories:
    - cost_complaint
    - self_host_intent
    - competitor_pain
  webhook_secret: EXAMPLE_SLACK_WEBHOOK_IMMEDIATE

digest:
  # Optional human-friendly label for the digest header in Slack. When
  # set, it replaces the entire "📊 Digest for <project>" phrase at
  # the top of the digest with the literal label you provide — so
  # `display_name: "Observability chatter"` renders as
  # "📊 Observability chatter · <date> · ...", with no "Digest for"
  # prefix. Unset falls back to the default "Digest for <project>"
  # form. Useful when you want the on-disk name short but the
  # Slack-facing label to read as a self-contained topic.
  # display_name: "Observability chatter"
  schedule:
    hour: 9
    minute: 0
    timezone: "America/Los_Angeles"
  webhook_secret: EXAMPLE_SLACK_WEBHOOK_DIGEST
  window_hours: 24

cost_caps:
  # Haiku daily token ceiling. X's daily read ceiling lives in
  # sources/x.yaml as `daily_read_cap`, not here — see
  # CostCapsConfig in config.py.
  daily_haiku_tokens: 500000

infra:
  # Leave commented out to skip the dedicated infra channel; the
  # cost-cap fallback path will page the immediate channel with a
  # [INFRA] prefix instead.
  # webhook_secret: EXAMPLE_SLACK_WEBHOOK_INFRA
